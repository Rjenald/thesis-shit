name: final_thesis_ui
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  path_provider: ^2.1.0
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  record: ^6.0.0
  permission_handler: ^12.0.1
  just_audio: ^0.10.5
  shared_preferences: ^2.3.0
  web_socket_channel: ^3.0.1
  share_plus: ^10.0.0
  youtube_player_iframe: ^5.0.0
  video_player: ^2.9.2
  youtube_explode_dart: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.3
  http: ^1.2.0

flutter_native_splash:
  color: "#050505"
  image: assets/logo.png
  android_12:
    color: "#050505"
    image: assets/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/videos/lifetime_benben.mp4
